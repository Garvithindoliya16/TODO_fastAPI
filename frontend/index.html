<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Todo App</h1>

    <button
        class="logout-btn"
        onclick="logout()"
    >
        Logout
    </button>

    <div class="input-area">

        <input
            type="text"
            id="taskInput"
            placeholder="Enter task"
        >
        <input
            type="text"
            id="taskDecription"
            placeholder="Enter Decription"
        >

        <button onclick="addTodo()">
            Add
        </button>

    </div>

    <ul id="todoList"></ul>
</div>

<script src="script.js"></script>

</body>
</html>
