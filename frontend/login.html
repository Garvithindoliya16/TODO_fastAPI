<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Login</h1>
    <input
        type="email"
        id="email"
        placeholder="Email"
    >
    <input
        type="password"
        id="password"
        placeholder="Password"
    >
    <button onclick="login()">
        Login
    </button>
    <p>
        Don't have account?
        <a href="register.html">
            Register
        </a>
    </p>

</div>

<script src="login.js"></script>

</body>
</html>
