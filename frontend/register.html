<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>Register</h1>

    <input
        type="text"
        id="username"
        placeholder="Username"
    >

    <input
        type="email"
        id="email"
        placeholder="Email"
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
    >

    <button onclick="register()">
        Register
    </button>
    <p>
        Already having account?
        <a href="login.html">
            Login
        </a>
    </p>

</div>

<script src="register.js"></script>

</body>
</html>
